<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="BRAC University Architecture Batch 2025 — Executive Digital Archive" />
    <title>BRACU Architecture '25 | Executive Archive</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- MOBILE TOPBAR -->
    <div class="mobile-topbar">
        <div class="mobile-brand">BRACU<span class="accent"> Archi '25</span></div>
        <button class="hamburger-btn" aria-label="Menu" onclick="toggleMobileMenu()">☰</button>
    </div>

    <!-- SIDEBAR -->
    <aside class="sidebar glass-panel" id="sidebar">
        <div class="sidebar-logo">
            <img src="https://i.ibb.co/LzfNqYj/bracu-logo.png" alt="BRACU Logo">
        </div>
        <nav class="sidebar-links">
            <button class="nav-link active" data-section="hero" onclick="showSection('hero', this)"><span>01</span><p>Home</p></button>
            <button class="nav-link" data-section="institution" onclick="showSection('institution', this)"><span>02</span><p>Institution</p></button>
            <button class="nav-link" data-section="programs" onclick="showSection('programs', this)"><span>03</span><p>Programs</p></button>
            <button class="nav-link" data-section="thesis" onclick="showSection('thesis', this)"><span>04</span><p>Thesis</p></button>
            <button class="nav-link" data-section="gallery" onclick="showSection('gallery', this)"><span>05</span><p>Gallery</p></button>
            <button class="nav-link" data-section="students" onclick="showSection('students', this)"><span>06</span><p>Architects</p></button>
        </nav>
        <div class="sidebar-bottom">
            <button class="theme-btn" onclick="toggleTheme()" aria-label="Toggle Theme">◐</button>
        </div>
    </aside>

    <div class="mobile-overlay" id="mobileOverlay" onclick="toggleMobileMenu()"></div>

    <main class="main-content">
        <!-- All sections remain with enhanced markup -->
        <!-- HERO -->
        <section id="hero" class="section active">
            <div class="hero-grid">
                <div class="hero-left">
                    <span class="section-tag">BRAC UNIVERSITY DEPARTMENT OF ARCHITECTURE</span>
                    <h1 class="hero-title">Design Beyond<br>Boundaries.</h1>
                    <p class="hero-description">A meticulously crafted digital archive celebrating the graduating class of 2025 — where vision meets precision.</p>
                    <div class="hero-buttons">
                        <button class="primary-btn" onclick="showSection('students')">Explore Architects</button>
                        <button class="secondary-btn" onclick="showSection('gallery')">Enter Gallery</button>
                    </div>
                </div>
                <div class="hero-right">
                    <div class="hero-logo-wrapper glass-panel">
                        <img src="https://i.ibb.co/LzfNqYj/bracu-logo.png" alt="BRACU Logo">
                    </div>
                </div>
            </div>
        </section>

        <!-- Other sections (institution, programs, thesis, gallery, students) are kept but enhanced in CSS -->
        <!-- Students Grid -->
        <section id="students" class="section">
            <span class="section-tag">THE CLASS OF 2025</span>
            <h2>Executive Directory</h2>
            <div class="students-grid" id="studentGrid"></div>
        </section>
    </main>

    <!-- PROFILE MODAL -->
    <div class="profile-modal" id="profileModal">
        <div class="profile-card glass-panel">
            <button class="close-modal" onclick="closeModal()" aria-label="Close">×</button>
            <div class="profile-image">
                <img id="modalImage" src="" alt="">
            </div>
            <h3 id="modalName"></h3>
            <p id="modalStudio" class="studio-name"></p>
            <div class="profile-details">
                <div class="detail-row"><span>Roll No.</span><p id="modalRoll"></p></div>
                <div class="detail-row"><span>Email</span><p id="modalEmail"></p></div>
                <div class="detail-row"><span>Focus Area</span><p id="modalFocus"></p></div>
            </div>
            <div class="profile-socials" id="profileSocials"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
