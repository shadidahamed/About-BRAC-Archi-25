                    <i class="fa-solid fa-triangle-exclamation"></i> Signature match failure. Check your Unique Tracking ID or account pass codes.
                </div>

                <div class="form-field-unit">
                    <label>Unique Matrix Tracking Identifier ID</label>
                    <input type="text" id="auth-id-input-field" placeholder="e.g., STU26001 or ARC26001" style="text-transform: uppercase;">
                </div>
                <div class="form-field-unit">
                    <label>Secured Profile Verification Password</label>
                    <input type="password" id="auth-password-input-field" placeholder="••••••••">
                </div>

                <button id="auth-execute-handshake-btn" class="btn-primary-glow auth-execution-submit-action-btn">
                    Execute Secure Login Handshake
                </button>
            </div>
        </div>
    </div>

    <div id="cinematic-lightbox-overlay" class="lightbox-player-scaffold-overlay">
        <button id="lightbox-close-btn" class="lightbox-dismiss-action-node"><i class="fa-solid fa-xmark"></i> Close Video Player</button>
        <div class="lightbox-iframe-media-container-shell">
            <iframe id="lightbox-iframe-target" src="" title="Cinematic Media Viewer Frame" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
        </div>
    </div>

    <script src="http://localhost:5000/socket.io/socket.io.js"></script>
    <script src="app.js"></script>
</body>
</html>
