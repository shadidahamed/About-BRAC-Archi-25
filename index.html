<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>BRAC ARCHI SUMMER 26</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
    <style>
        :root {
            --primary: #2A4A8C;      /* Logo Blue */
            --accent: #C44A2F;       /* Terracotta/Brick */
            --beige: #E8D9C0;
            --concrete: #5C5C5C;
            --green: #2E5A3F;
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Manrope', sans-serif;
            background: #0F0F0F;
            color: #eee;
            overflow-x: hidden;
        }

        .glass-card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        /* ================== TIRE CAROUSEL ================== */
        .tire-carousel {
            position: relative;
            height: 420px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 40px 0;
        }
        .tire-ring {
            width: 380px;
            height: 380px;
            border: 18px solid rgba(200, 140, 80, 0.3);
            border-radius: 50%;
            position: relative;
            animation: rotateTire 35s linear infinite;
        }
        @keyframes rotateTire {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .tire-image {
            position: absolute;
            width: 90px;
            height: 90px;
            border-radius: 12px;
            overflow: hidden;
            border: 3px solid #fff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            transition: transform 0.4s ease;
        }
        .tire-image:hover { transform: scale(1.15); z-index: 10; }

        /* ================== STUDENT CARDS ================== */
        .student-dashboard {
            transition: all 0.4s cubic-bezier(0.23,1,0.32,1);
        }
        .student-dashboard:hover {
            transform: translateY(-12px) rotate(1deg);
            box-shadow: 0 20px 40px rgba(42,74,140,0.3);
        }

        /* ================== ACHIEVEMENTS ================== */
        .achievement-card {
            transition: all 0.5s ease;
        }
        .achievement-card:hover {
            transform: translateY(-10px) rotate(2deg);
        }

        .hero-visual img, .logo-video-container video {
            max-width: 100%;
            height: auto;
            border-radius: 16px;
        }
    </style>
</head>
<body>

<header class="navbar-wrapper" style="background:rgba(15,15,15,0.95); backdrop-filter:blur(12px);">
    <div class="container navbar" style="max-width:1200px; margin:auto; padding:1rem;">
        <div style="display:flex; align-items:center; gap:12px;">
            <img src="https://i.imgur.com/BRAC-logo.png" alt="BRAC" width="48" height="48"> <!-- Replace with actual logo -->
            <h2 style="color:white;">BRAC ARCHI <span style="color:#C44A2F;">SUMMER 26</span></h2>
        </div>
    </div>
</header>

<main>
    <!-- ================== LOGO SECTION ================== -->
    <section id="logo-info" class="spa-section" style="padding:80px 20px; background:linear-gradient(to bottom, #0F0F0F, #1A2521);">
        <div class="container" style="max-width:1100px; margin:auto; text-align:center;">
            <h1 style="font-size:2.8rem; margin-bottom:20px;">The Identity</h1>
            <p style="max-width:700px; margin:0 auto 40px; font-size:1.1rem; color:#ddd;">
                Inspired by the iconic BRAC University architecture — a perfect blend of brutalist strength, natural greenery, and modern vision.
            </p>
            
            <div class="logo-video-container glass-card" style="max-width:800px; margin:0 auto; padding:20px;">
                <video controls poster="https://your-image-link.jpg" style="width:100%; border-radius:16px;">
                    <source src="your-video.mp4" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
            </div>
        </div>
    </section>

    <!-- ================== 360° TIRE CAROUSEL (Campus) ================== -->
    <section style="padding:60px 20px; background:#1A2521;">
        <div class="container" style="text-align:center;">
            <h2 style="margin-bottom:40px; color:white;">Campus in 360° Rotation</h2>
            <div class="tire-carousel">
                <div class="tire-ring" id="tireRing">
                    <!-- Images will be added by JS -->
                </div>
            </div>
        </div>
    </section>

    <!-- ================== FUTURE ARCHITECTS ================== -->
    <section id="students" style="padding:80px 20px;">
        <div class="container" style="max-width:1200px; margin:auto;">
            <h2 style="text-align:center; margin-bottom:50px;">Future Architects</h2>
            <div id="studentsGrid" style="display:grid; grid-template-columns:repeat(auto-fit, minmax(320px,1fr)); gap:30px;">
                <!-- Populated by JS or manually -->
            </div>
        </div>
    </section>

    <!-- ================== ACHIEVEMENTS ================== -->
    <section id="achievements" style="padding:80px 20px; background:#0F0F0F;">
        <div class="container" style="max-width:1200px; margin:auto;">
            <h2 style="text-align:center; margin-bottom:50px;">Our Achievements</h2>
            <div style="display:flex; flex-wrap:wrap; gap:25px; justify-content:center;">
                <!-- Add your achievement cards here with class="achievement-card glass-card" -->
            </div>
        </div>
    </section>
</main>

<script>
// Tire Carousel Images (replace with your actual campus photos)
const campusImages = [
    "https://your-image-link-1.jpg",  // Main Gate
    "https://your-image-link-2.jpg",
    "https://your-image-link-3.jpg",
    // Add more...
];

const tireRing = document.getElementById('tireRing');
campusImages.forEach((src, i) => {
    const angle = (i * 360) / campusImages.length;
    const img = document.createElement('img');
    img.src = src;
    img.className = 'tire-image';
    img.style.transform = `rotate(${angle}deg) translate(170px) rotate(-${angle}deg)`;
    tireRing.appendChild(img);
});

// Example Student Card
const studentsGrid = document.getElementById('studentsGrid');
const studentHTML = `
<div class="glass-card student-dashboard" style="padding:25px; text-align:center;">
    <img src="student-photo.jpg" style="width:140px; height:140px; border-radius:50%; object-fit:cover; border:4px solid #C44A2F;">
    <h3 style="margin:15px 0 5px;">Shadid Islam</h3>
    <p><strong>Merit: 01</strong> | Roll: 231-15-XXX | Dept: Architecture</p>
    <div style="margin:20px 0; display:flex; justify-content:center; gap:12px; font-size:1.4rem;">
        <a href="#"><i class="fab fa-facebook"></i></a>
        <a href="#"><i class="fab fa-instagram"></i></a>
        <a href="#"><i class="fab fa-whatsapp"></i></a>
        <a href="#"><i class="fab fa-linkedin"></i></a>
        <a href="#"><i class="fas fa-envelope"></i></a>
    </div>
</div>`;
studentsGrid.innerHTML += studentHTML;
</script>

</body>
</html>
